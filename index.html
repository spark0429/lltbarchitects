<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>lltb architects</title>
    <meta name="description" content="lltb architects portfolio and studio website">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="site" style="--chosen-color: #8f1d1d; --chosen-color-soft: rgba(143, 29, 29, 0.36); --texture-a: #d8d1c5; --texture-b: #9f988e; --texture-c: rgba(255,255,255,0.34);">
      <section class="builder is-hidden" aria-label="material builder">
        <div class="builder-panel" data-step="color">
          <p class="kicker">lltb material study</p>
          <h1>choose your color</h1>
          <div class="swatch-grid color-grid" id="colorGrid" aria-label="color choices"></div>
        </div>

        <div class="builder-panel" data-step="material">
          <p class="kicker">lltb material study</p>
          <h1>choose your material</h1>
          <div class="swatch-grid material-grid" id="materialGrid" aria-label="material choices"></div>
        </div>
        <button class="skip-button" id="skipButton" type="button">skip</button>
      </section>

      <section class="logo-stage" aria-label="lltb navigation">
        <button class="home-remix-button diagram-button" id="homeRemixButton" type="button" aria-label="new material"><span class="diagram-icon new-diagram" aria-hidden="true"></span><span class="sr-only">new material</span></button>
        <div class="lltb-logo" id="lltbLogo" aria-label="main navigation">
          <canvas class="logo-visible-fallback" id="logoFallbackCanvas" width="230" height="132" aria-hidden="true"></canvas>
          <div class="logo-material-fill" aria-hidden="true"></div>
          <div class="logo-hover-fill" data-hover-layer="about" aria-hidden="true"></div>
          <div class="logo-hover-fill" data-hover-layer="people" aria-hidden="true"></div>
          <div class="logo-hover-fill" data-hover-layer="projects" aria-hidden="true"></div>
          <div class="logo-hover-fill" data-hover-layer="contact" aria-hidden="true"></div>
          <nav class="logo-hit-nav" aria-label="main navigation">
            <button class="logo-hit" data-section="about" data-glyph="l" aria-label="about"><span>about</span></button>
            <button class="logo-hit" data-section="people" data-glyph="l" aria-label="people"><span>people</span></button>
            <button class="logo-hit" data-section="projects" data-glyph="t" aria-label="project"><span>project</span></button>
            <button class="logo-hit" data-section="contact" data-glyph="b" aria-label="contact"><span>contact</span></button>
          </nav>
        </div>
      </section>

      <section class="portal" aria-hidden="true">
        <div class="portal-letter">
          <span id="portalGlyph">l</span>
          <div class="window-stack" aria-hidden="true"></div>
        </div>
      </section>

      <section class="content-view is-hidden" aria-label="content">

        <aside class="section-rail" aria-label="section navigation">
          <button class="home-button diagram-button" id="homeButton" type="button" aria-label="home">
            <span class="diagram-icon home-diagram" aria-hidden="true"></span>
          </button>
          <button data-section="about">l</button>
          <button data-section="people">l</button>
          <button data-section="projects">t</button>
          <button data-section="contact">b</button>
          <button class="remix-button diagram-button" id="remixButton" type="button" aria-label="new material"><span class="diagram-icon new-diagram" aria-hidden="true"></span><span class="sr-only">new material</span></button>
        </aside>

        <article class="content-frame">
          <header class="content-head">
            <p class="kicker">lltb architects</p>
            <h2 id="contentTitle">about</h2>
          </header>
          <div class="content-body" id="contentBody"></div>
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
